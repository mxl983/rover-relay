services:
  relay:
    build: .
    # `always`: comes back after reboot even if the container was stopped before shutdown.
    # `unless-stopped` does not restart in that case.
    restart: always
    ports:
      - "${RELAY_PUBLIC_HTTPS_PORT:-443}:8787"
      - "${RELAY_PORT:-8787}:8787"
      - "${RELAY_HTTP_REDIRECT_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: "8787"
      HOST: "0.0.0.0"
      SSL_ENABLED: ${SSL_ENABLED:-true}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/certs/relay.crt}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/certs/relay.key}
      HTTP_REDIRECT_ENABLED: ${HTTP_REDIRECT_ENABLED:-false}
      HTTP_REDIRECT_PORT: ${HTTP_REDIRECT_PORT:-8080}
      MQTT_BOOT_ENABLED: ${MQTT_BOOT_ENABLED:-false}
      MQTT_BOOT_URL: ${MQTT_BOOT_URL:-wss://84f09906a62e42c78c5d9b0555aa71f1.s1.eu.hivemq.cloud:8884/mqtt}
      MQTT_BOOT_USER: ${MQTT_BOOT_USER:-}
      MQTT_BOOT_PASS: ${MQTT_BOOT_PASS:-}
      MQTT_BOOT_TOPIC: ${MQTT_BOOT_TOPIC:-rover/power/pi}
      MQTT_BOOT_PAYLOAD_PREFIX: ${MQTT_BOOT_PAYLOAD_PREFIX:-On}
      TELEMETRY_DB_PATH: /app/data/relay.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://mxl983.github.io}
      ROVER_API_TOKEN: ${ROVER_API_TOKEN:-}
      BACKUP_CAM_STREAM_URL: ${BACKUP_CAM_STREAM_URL:-http://192.168.1.220:81/stream}
      BACKUP_CAM_STREAM_AUTH: ${BACKUP_CAM_STREAM_AUTH:-false}
      ROVER_HEARTBEAT_STALE_MS: ${ROVER_HEARTBEAT_STALE_MS:-90000}
      ROVER_BOOT_TOTAL_MS: ${ROVER_BOOT_TOTAL_MS:-50000}
      BATTERY_DRAIN_WINDOW_MS: ${BATTERY_DRAIN_WINDOW_MS:-120000}
      ROVER_LATITUDE: ${ROVER_LATITUDE:-}
      ROVER_LONGITUDE: ${ROVER_LONGITUDE:-}
      CHARGING_LED_WEBCAM_DEVICE: ${CHARGING_LED_WEBCAM_DEVICE:-/dev/video0}
      CHARGING_LED_WEBCAM_TIMEOUT_MS: ${CHARGING_LED_WEBCAM_TIMEOUT_MS:-2500}
      CHARGING_LED_WEBCAM_WIDTH: ${CHARGING_LED_WEBCAM_WIDTH:-320}
      CHARGING_LED_WEBCAM_HEIGHT: ${CHARGING_LED_WEBCAM_HEIGHT:-240}
      CHARGING_LED_WEBCAM_CAPTURE_SIZE: ${CHARGING_LED_WEBCAM_CAPTURE_SIZE:-}
      CHARGING_LED_WEBCAM_CACHE_TTL_MS: ${CHARGING_LED_WEBCAM_CACHE_TTL_MS:-200}
      CHARGING_LED_WEBCAM_INPUT_FORMAT: ${CHARGING_LED_WEBCAM_INPUT_FORMAT:-mjpeg}
      CHARGING_LED_WEBCAM_STUB: ${CHARGING_LED_WEBCAM_STUB:-}
      CHARGING_LED_CHARGING_HUE_MIN: ${CHARGING_LED_CHARGING_HUE_MIN:-0}
      CHARGING_LED_CHARGING_HUE_MAX: ${CHARGING_LED_CHARGING_HUE_MAX:-72}
      CHARGING_LED_GREEN_HUE_MIN: ${CHARGING_LED_GREEN_HUE_MIN:-73}
      CHARGING_LED_GREEN_HUE_MAX: ${CHARGING_LED_GREEN_HUE_MAX:-165}
      CHARGING_LED_IGNORE_BELOW_RGB_MAX: ${CHARGING_LED_IGNORE_BELOW_RGB_MAX:-14}
      CONTROL_DASHBOARD_PROXY_ENABLED: ${CONTROL_DASHBOARD_PROXY_ENABLED:-true}
      CONTROL_DASHBOARD_PROXY_BASE_PATH: ${CONTROL_DASHBOARD_PROXY_BASE_PATH:-/mangomate}
      CONTROL_DASHBOARD_PROXY_TARGET: ${CONTROL_DASHBOARD_PROXY_TARGET:-http://control-dashboard:80}
      LIDAR_SCAN_FILE_PATH: ${LIDAR_SCAN_FILE_PATH:-/app/lidar/scan.json}
      LIDAR_SCAN_UPSTREAM_URL: ${LIDAR_SCAN_UPSTREAM_URL:-}
      LIDAR_WS_PUSH_MS: ${LIDAR_WS_PUSH_MS:-50}
    volumes:
      - relay-data:/app/data
      - lidar-data:/app/lidar
      - ./certs:/certs:ro
    # USB webcam for charger LED (must exist on the Docker host). If the host has no camera,
    # comment out `devices` below or `docker compose up` may fail when /dev/video0 is missing.
    devices:
      - ${CHARGING_LED_WEBCAM_DEVICE:-/dev/video0}:${CHARGING_LED_WEBCAM_DEVICE:-/dev/video0}

  ros2-lidar:
    build:
      context: .
      dockerfile: ros2-lidar/Dockerfile
    restart: always
    # Host networking is required so CycloneDDS can bind to tailscale0 for Pi discovery.
    network_mode: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_LOCALHOST_ONLY: ${ROS_LOCALHOST_ONLY:-0}
      LIDAR_TOPIC: ${LIDAR_TOPIC:-/scan}
      DDS_LOCAL_INTERFACE: ${DDS_LOCAL_INTERFACE:-lo}
      DDS_TAILSCALE_INTERFACE: ${DDS_TAILSCALE_INTERFACE:-tailscale0}
      SERVER_DDS_EXTERNAL_ADDRESS: ${SERVER_DDS_EXTERNAL_ADDRESS:-100.96.16.121}
      ROVER_DDS_PEER: ${ROVER_DDS_PEER:-100.109.197.90}
      LOCAL_DDS_PEER: ${LOCAL_DDS_PEER:-127.0.0.1}
      LIDAR_VIEWER_PORT: ${LIDAR_VIEWER_PORT:-8765}
      LIDAR_VIEWER_HOST: ${LIDAR_VIEWER_HOST:-0.0.0.0}
      LIDAR_SCAN_FILE_PATH: ${LIDAR_SCAN_FILE_PATH:-/app/lidar/scan.json}
      LIDAR_WS_MAX_POINTS: ${LIDAR_WS_MAX_POINTS:-0}
      LIDAR_STABILIZED_TOPIC: ${LIDAR_STABILIZED_TOPIC:-/stabilized_scan}
      LIDAR_VIEW_TOPIC: ${LIDAR_VIEW_TOPIC:-/scan}
      LIDAR_STABILIZER_FRAMES: ${LIDAR_STABILIZER_FRAMES:-8}
      LIDAR_STABILIZER_DECAY: ${LIDAR_STABILIZER_DECAY:-0.75}
      LIDAR_STABILIZER_HIT_BOOST: ${LIDAR_STABILIZER_HIT_BOOST:-0.35}
      LIDAR_STABILIZER_MIN_CONFIDENCE: ${LIDAR_STABILIZER_MIN_CONFIDENCE:-0.25}
      LIDAR_STABILIZER_BIN_DEG: ${LIDAR_STABILIZER_BIN_DEG:-2}
      LIDAR_STABILIZER_TARGET_FRAME: ${LIDAR_STABILIZER_TARGET_FRAME:-base_link}
      LIDAR_STABILIZER_LOG_INTERVAL_S: ${LIDAR_STABILIZER_LOG_INTERVAL_S:-2}
    volumes:
      - lidar-data:/app/lidar
    command: ["viewer"]

  control-dashboard:
    build:
      context: .
      dockerfile: control-dashboard/Dockerfile
      args:
        VITE_BASE_PATH: ${CONTROL_DASHBOARD_BASE_PATH:-/mangomate/}
        VITE_PI_SERVER_IP: ${CONTROL_DASHBOARD_PI_SERVER_IP:-rover.tail9d0237.ts.net}
        VITE_MQTT_HOST: ${CONTROL_DASHBOARD_MQTT_HOST:-wss://84f09906a62e42c78c5d9b0555aa71f1.s1.eu.hivemq.cloud:8884/mqtt}
        VITE_RELAY_BASE_URL: ${CONTROL_DASHBOARD_RELAY_BASE_URL:-https://jjcloud.tail9d0237.ts.net}
        VITE_WEBRTC_ICE_MODE: ${CONTROL_DASHBOARD_WEBRTC_ICE_MODE:-tailnet}
        VITE_WEBRTC_SIGNALING_MODE: ${CONTROL_DASHBOARD_WEBRTC_SIGNALING_MODE:-proxy}
        VITE_VIDEO_STREAM_MODE: ${CONTROL_DASHBOARD_VIDEO_STREAM_MODE:-webrtc}
        VITE_VOICE_DRIVE_DEBUG: ${CONTROL_DASHBOARD_VOICE_DRIVE_DEBUG:-true}
        VITE_BACKUP_STREAM_URL: ${CONTROL_DASHBOARD_BACKUP_STREAM_URL:-}
        VITE_CAMERA_SECRET: ${CONTROL_DASHBOARD_CAMERA_SECRET:-}
        VITE_LIDAR_SCAN_URL: ${CONTROL_DASHBOARD_LIDAR_SCAN_URL:-}
    restart: always
    depends_on:
      - relay
    ports:
      - "${CONTROL_DASHBOARD_PORT:-5174}:80"

volumes:
  relay-data:
  lidar-data:
